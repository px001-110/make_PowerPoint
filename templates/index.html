{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>PowerPoint自動生成</h1>
    <p>Wordファイルからパワーポイントを生成するwebアプリです。</p>
    <p>下の点線内にWordファイルをドラッグ&ドロップするか、ファイル選択ボタンを押してWordファイルを選択してください。</p>

    <div id="drop-zone">

        ここへファイルをドラッグ&ドロップ

    </div>


    <input type="file" id="file-input" multiple>

    <ul id="file-list"></ul>

    <div class="filename-area">

        <label>
            出力ファイル名（入力がなければ「日付＋自動生成」という名前になります。）
        </label>

        <input type="text" id="output-name" placeholder="ここに名前を入力してください。">

    </div>

    <button id="upload-btn">
        生成する
    </button>

    <div id="loading">
        生成中...
    </div>

</div>

{% endblock %}
